name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd app
          npm install
          npm install -g jest

      - name: Run unit tests
        run: jest tests/unit --forceExit
        env:
          NODE_ENV: test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd app
          npm install
          npm install -g jest

      - name: Run E2E tests
        run: jest tests/e2e --forceExit
        env:
          NODE_ENV: test

  build-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netwatch-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/netwatch-app:${{ github.sha }}

  deploy:
    name: Deploy on Azure VM
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/netwatch-app:latest

            # Idempotent: stop & remove existing container if running
            docker stop netwatch-app 2>/dev/null || true
            docker rm netwatch-app 2>/dev/null || true

            # Start new container
            docker run -d \
              --name netwatch-app \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/netwatch-app:latest

            # Healthcheck
            sleep 5
            curl -f http://localhost:3000/health || exit 1
            echo "Deployment successful!"
